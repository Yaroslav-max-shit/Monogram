services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file: backend/.env
    volumes:
      - uploads:/app/backend/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "4173:4173"
    env_file: frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  uploads:
